name: parity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check cross-workspace parity
        run: python3 scripts/check-parity.py
